stages:
  - test
  - build

test:go:
  stage: test
  image: golang:1.26-alpine
  before_script:
    - cd docqa/api
    - go mod download
  script:
    - go vet ./...
    - go test ./... -v -count=1
  cache:
    key: go-$CI_COMMIT_REF_SLUG
    paths:
      - api/vendor/
  rules:
    - changes:
        - api/**/*

test:python:
  stage: test
  image: python:3.11-slim
  before_script:
    - cd docqa/embed
    - pip install --no-cache-dir -r requirements.txt
  script:
    - python -m pytest tests/ -v
  cache:
    key: pip-$CI_COMMIT_REF_SLUG
    paths:
      - embed/.cache/pip/
  rules:
    - changes:
        - embed/**/*
        
build:api:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    IMAGE: $CI_REGISTRY_IMAGE/api:$CI_COMMIT_SHORT_SHA
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $IMAGE ./api
    - docker push $IMAGE
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - api/**/*

build:embed:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    IMAGE: $CI_REGISTRY_IMAGE/embed:$CI_COMMIT_SHORT_SHA
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $IMAGE ./embed
    - docker push $IMAGE
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - embed/**/*