version: "3.9"

services:
  # ─────────────────────────────────────────
  # Go API Gateway
  # ─────────────────────────────────────────
  api:
    build:
      context: ./docqa/api
      dockerfile: Dockerfile
    container_name: docqa-api
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - EMBED_SERVICE_URL=http://embed:8000
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}    # ollama | openai | anthropic
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - UPLOAD_DIR=/data/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"     # lets container reach Ollama on host (Linux)
    volumes:
      - uploads:/data/uploads
    depends_on:
      embed:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Python Embed + Retrieval Service
  # ─────────────────────────────────────────
  embed:
    build:
      context: ./docqa/embed
      dockerfile: Dockerfile
    container_name: docqa-embed
    ports:
      - "8030:8000"
    environment:
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - MODEL_NAME=all-MiniLM-L6-v2
      - TOP_K=5
    volumes:
      - model_cache:/root/.cache/torch
    depends_on:
      chroma:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s          # give time for model download on first run

  # ─────────────────────────────────────────
  # ChromaDB — Vector Store
  # ─────────────────────────────────────────
  chroma:
    image: chromadb/chroma:0.5.4
    container_name: docqa-chroma
    ports:
      - "8001:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  uploads:
    driver: local
  chroma_data:
    driver: local
  model_cache:
    driver: local
